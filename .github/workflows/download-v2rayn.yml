name: Download v2rayN Release

on:
  workflow_dispatch:

jobs:
  download-and-commit:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Download file
        run: |
          mkdir -p assets
          curl -L --fail -o assets/v2rayN-windows-64-desktop.zip \
            https://github.com/2dust/v2rayN/releases/download/7.20.4/v2rayN-windows-64-desktop.zip

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add assets/v2rayN-windows-64-desktop.zip
          git commit -m "Update v2rayN 7.20.4" || echo "No changes to commit"
          git push
