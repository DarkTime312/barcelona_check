name: Download Website as ZIP

on:
  workflow_dispatch:
    inputs:
      website_url:
        description: 'Website URL to download'
        required: true
        type: string
        default: 'https://example.com'
      max_pages:
        description: 'Max pages to crawl'
        required: false
        type: string
        default: '100'
      threads:
        description: 'Concurrent threads'
        required: false
        type: string
        default: '8'
      destination_folder:
        description: 'Base name for folder/ZIP'
        required: false
        type: string
        default: 'downloaded_site'

jobs:
  download-and-zip:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install system dependencies
        run: sudo apt-get update && sudo apt-get install -y wget curl

      - name: Clone website-downloader
        run: git clone https://github.com/PKHarsimran/website-downloader.git

      - name: Install Python dependencies
        run: |
          cd website-downloader
          pip install -r requirements.txt

      - name: Generate unique folder name
        id: vars
        run: echo "folder=${{ github.event.inputs.destination_folder }}-$(date +%Y%m%d-%H%M%S)" >> $GITHUB_OUTPUT

      - name: Download website
        run: |
          cd website-downloader
          python website-downloader.py \
            --url "${{ github.event.inputs.website_url }}" \
            --destination "$GITHUB_WORKSPACE/${{ steps.vars.outputs.folder }}" \
            --max-pages "${{ github.event.inputs.max_pages }}" \
            --threads "${{ github.event.inputs.threads }}"

      - name: Debug - Show downloaded files
        run: |
          echo "Workspace contents:"
          ls -la "$GITHUB_WORKSPACE"
          echo "Downloaded folder contents:"
          ls -la "$GITHUB_WORKSPACE/${{ steps.vars.outputs.folder }}" || echo "Folder missing!"

      - name: Zip the downloaded site
        run: |
          cd "$GITHUB_WORKSPACE"
          zip -r "${{ steps.vars.outputs.folder }}.zip" "${{ steps.vars.outputs.folder }}"

      - name: Commit and push ZIP
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "💾 Archive website: ${{ github.event.inputs.website_url }}"
          file_pattern: "${{ steps.vars.outputs.folder }}.zip"
