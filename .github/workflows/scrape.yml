name: Scrape Reddit and Commit Zip

on:
  workflow_dispatch:
    inputs:
      url:
        description: 'URL to scrape'
        required: true
        default: 'https://old.reddit.com/r/webdev/'

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  scrape-and-commit:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Scrape the website
        run: |
          mkdir -p scraped_page
          cd scraped_page
          rm -rf *
          
          # Removed Accept-Encoding to ensure wget saves plain HTML, not a compressed stream
          wget -p -k -E \
            --header="Accept: text/html,application/xhtml+xml,application/xml;q=0.9,image/avif,image/webp,*/*;q=0.8" \
            --header="Accept-Language: en-US,en;q=0.5" \
            --header="Connection: keep-alive" \
            --header="Upgrade-Insecure-Requests: 1" \
            --header="Sec-Fetch-Dest: document" \
            --header="Sec-Fetch-Mode: navigate" \
            --header="Sec-Fetch-Site: none" \
            --header="Sec-Fetch-User: ?1" \
            -U "Mozilla/5.0 (Windows NT 10.0; Win64; x64; rv:125.0) Gecko/20100101 Firefox/125.0" \
            "${{ github.event.inputs.url }}" || true

      - name: Zip the scraped files
        run: |
          cd ${{ github.workspace }}
          zip -r scraped_data.zip scraped_page/

      - name: Commit and push changes
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          
          # Add only the zip file to git
          git add scraped_data.zip
          
          git diff --quiet && git diff --staged --quiet || (git commit -m "Scraped and zipped: ${{ github.event.inputs.url }}" && git push)
